<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyTracker — Study Tracker v1.2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- Topbar -->
<div class="topbar">
  <div class="logo" onclick="navigate('dashboard')">StudyTracker<span class="logo-sub"> v1.2</span></div>
  <div id="topLevelBar" class="top-level-bar hidden" onclick="navigate('dashboard')" title="Your progression"></div>
  <div id="miniTimerBadge" class="mini-timer-badge hidden" onclick="navigate('dashboard')" title="Go to your running timer"></div>
  <div class="nav-btns">
    <button class="nav-btn active" data-page="dashboard" onclick="navigate('dashboard')">Dashboard</button>
    <button class="nav-btn" data-page="timetable" onclick="navigate('timetable')">Timetable</button>
    <button class="nav-btn" data-page="self_study" onclick="navigate('self_study')">Self-Study</button>
    <button class="nav-btn" data-page="attendance" onclick="navigate('attendance')">Attendance</button>
    <button class="nav-btn" data-page="exams" onclick="navigate('exams')">Exams</button>
    <button class="nav-btn" data-page="events" onclick="navigate('events')">Events</button>
    <button class="nav-btn" data-page="stats" onclick="navigate('stats')">Stats</button>
    <button class="nav-btn" data-page="progression" onclick="navigate('progression')">Progression</button>
    <button class="nav-btn" data-page="settings" onclick="navigate('settings')">Settings</button>
  </div>
  <div class="profile-selector">
    <select id="profileSelect" onchange="switchProfile(this.value)"></select>
    <button class="btn btn-sm btn-outline" onclick="showProfileModal()">+</button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div id="content" class="content">
    <!-- Dynamic content loaded here -->
  </div>
</div>

<!-- Theme Preview Lock Overlay — blocks all interaction with the app
     underneath while a locked theme is being previewed. Sits above
     .main/.topbar but below the preview banner itself (the banner is a
     sibling appended after this, later in the DOM / higher stacking
     context). -->
<div id="previewLockOverlay" class="preview-lock-overlay hidden"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent" onclick="event.stopPropagation()"></div>
</div>

<script src="app.js"></script>
</body>
</html>
